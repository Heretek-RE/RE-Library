name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  astro:
    name: Astro check + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
      - run: npm ci
      - run: npx astro check
      - run: npm run build

  python:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - working-directory: mcp-server
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pytest -q
